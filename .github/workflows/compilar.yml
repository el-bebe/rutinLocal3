name: Compilar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Buscar y dar permisos a gradlew
        run: |
          # Busca el archivo gradlew en cualquier carpeta
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: No se encontró gradlew"
            exit 1
          fi
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Mover el APK a la raíz para que el siguiente paso lo encuentre
          mkdir -p $GITHUB_WORKSPACE/app/build/outputs/apk/debug/
          cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app/build/outputs/apk/debug/ 2>/dev/null || true

      - name: Subir el APK Generado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
