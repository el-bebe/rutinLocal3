name: Compilar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fabricar gradlew automáticamente
        run: |
          # Como no está el archivo, instalamos Gradle en el robot y lo generamos
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper
          chmod +x gradlew

      - name: Compilar Aplicación (APK)
        run: ./gradlew assembleDebug

      - name: Subir el APK Generado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
