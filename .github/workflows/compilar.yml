name: Compilar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Gradle Moderno
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5' # Una versión moderna que entiende Java 17 perfectamente

      - name: Fabricar el ejecutable wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Compilar Aplicación (APK)
        run: ./gradlew assembleDebug

      - name: Subir el APK Generado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
